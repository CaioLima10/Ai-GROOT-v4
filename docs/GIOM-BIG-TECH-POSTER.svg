      .component-label { font-size: 16px; font-weight: 600; fill: #333; }
      .metric-label { font-size: 14px; fill: #666; }
      .icon { font-size: 32px; }
      .arrow-label { font-size: 12px; fill: #666; font-style: italic; }
      .box-api { fill: #E0F7FA; stroke: #006064; stroke-width: 3; }
