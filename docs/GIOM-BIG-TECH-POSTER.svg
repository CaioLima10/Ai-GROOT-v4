      .box-metrics { fill: #F3E5F5; stroke: #6A1B9A; stroke-width: 3; }
      .box-response { fill: #C8E6C9; stroke: #2E7D32; stroke-width: 3; }
      .arrow { stroke: #333; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow-highlight { stroke: #D32F2F; stroke-width: 3; fill: none; stroke-dasharray: 5,5; marker-end: url(#arrowhead-red); }
      .metric-box { fill: #FFEBEE; stroke: #C62828; stroke-width: 2; }
      .success-box { fill: #E8F5E9; stroke: #2E7D32; stroke-width: 2; }
      .text-metric { font-size: 12px; fill: #C62828; font-weight: bold; }
