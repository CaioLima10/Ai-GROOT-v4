global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: giom_api
    metrics_path: /metrics/memoryContext
    params:
      format: [prometheus]
      includeDistributed: ["true"]
    static_configs:
      - targets: ["api1:3000", "api2:3000"]

  - job_name: giom_doc_reader
    metrics_path: /metrics
    static_configs:
      - targets: ["doc-reader:8090"]
