# Render Deploy Configuration
services:
  # Main AI API Service
  - type: web
    name: giom-ai
    env: node
    plan: free
    region: oregon
    
    # Build and start commands
    buildCommand: "npm install"
    startCommand: "npm run start"
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: GROOT_MODE
        value: quantum
      - key: EMBEDDINGS_PROVIDER
        value: local
      - key: LOCAL_EMBEDDING_DIMENSIONS
        value: 768
      - key: GEMINI_API_KEY
        sync: false # Configure in Render dashboard
      - key: OPENROUTER_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
    
    # Health check
    healthCheckPath: /health
    
    # Auto-deploy from GitHub
    repo: https://github.com/CaioLima10/Ai-GROOT-v4.git
    rootDir: /
    branch: release-main
    
    # Ports
    httpHeaders:
      - path: /*
        name: Access-Control-Allow-Origin
        value: "*"
      - path: /*
        name: Access-Control-Allow-Methods
        value: "GET, POST, PUT, DELETE, OPTIONS"
      - path: /*
        name: Access-Control-Allow-Headers
        value: "Content-Type, Authorization"

  # PostgreSQL Database (free tier)
  - type: pserv
    name: giom-ai-db
    plan: free
    region: oregon
    databaseName: aigroot
    
    # Connection details (auto-generated by Render)
    envVars:
      - key: DATABASE_URL
        sync: false # Will be auto-populated by Render

# Custom domains (configure after deploy)
domains:
  - domain: giom-ai.onrender.com
    service: giom-ai
    path: /
