# Zeabur Deploy Configuration
version: "1.0"
name: giom-ai

services:
  # Main AI Service
  - type: web
    name: giom-api
    env: node
    buildCommand: "npm install"
    startCommand: "node apps/api/src/server.js"
    plan: free
    region: us-west
    
    # Environment variables (configure in Zeabur dashboard)
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: GEMINI_API_KEY
        sync: false # Set manually in dashboard
      - key: OPENROUTER_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
    
    # Health check
    healthCheckPath: /health
    
    # Auto-deploy from GitHub
    sourceDir: /
    
    # Ports
    ports:
      - port: 3000
        protocol: http

  # Static frontend (separate service)
  - type: web
    name: giom-frontend
    env: static
    buildCommand: "echo 'Static files ready'"
    plan: free
    region: us-west
    
    # Serve static files
    rootDir: apps/web/public
    routes:
      - path: /
        dest: index.html
      - path: /admin
        dest: admin.html
      - path: /style.css
        dest: style.css
      - path: /chat.js
        dest: chat.js

# Domains (configure after deploy)
domains:
  - domain: giom-ai.zeabur.app
    service: giom-api
    path: /
  - domain: giom-ai-admin.zeabur.app
    service: giom-api
    path: /admin
