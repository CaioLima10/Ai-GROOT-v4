name: GIOM — Full Stack CI (PR Gate)

# Runs on every Pull Request to main.
# Blocks merges if critical checks fail.
# GIOM's memory integrity must pass before any merge is allowed.

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ── 1. GIOM Memory Integrity ──────────────────────────────────────────────────
  memory-integrity:
    name: GIOM Memory Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Backup memory (pre-PR)
        run: node scripts/giom-memory-backup.mjs backup
        continue-on-error: true
      - name: Verify memory backup
        run: node scripts/giom-memory-backup.mjs verify
        continue-on-error: true

  # ── 2. Backend Syntax + Smoke ─────────────────────────────────────────────────
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Syntax check
        run: |
          node --check apps/api/src/server.js
          node --check scripts/ops-runtime-check.mjs
          node --check scripts/giom-memory-backup.mjs
      - name: Import validation
        run: node -e "import('./apps/api/src/server.js')" --input-type=module
        continue-on-error: true

  # ── 2b. Reliability Fast (blocking) ─────────────────────────────────────────
  reliability-fast:
    name: Reliability Gate (Fast)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Run reliability fast profile
        run: npm run reliability:gate:fast

      - name: Upload reliability fast reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: reliability-fast-reports
          path: reports/reliability/**
          if-no-files-found: ignore

  # ── 2c. Reliability Strict (informational) ──────────────────────────────────
  reliability-strict:
    name: Reliability Gate (Strict)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Run reliability strict profile
        run: npm run reliability:gate:strict

      - name: Upload reliability strict reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: reliability-strict-reports
          path: reports/reliability/**
          if-no-files-found: ignore

  # ── 3. Frontend Build ─────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: TypeScript check
        run: cd apps/web-next && npx tsc --noEmit
        continue-on-error: true
      - name: Build
        run: npm run web-next:build
        env:
          NEXT_PUBLIC_BACKEND_PROXY_TARGET: http://localhost:3000
          NEXT_PUBLIC_API_BASE_URL: ""

  # ── 4. Security audit ────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --ignore-scripts
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true   # informational — don't block PRs on audit

  # ── 5. PR summary ─────────────────────────────────────────────────────────────
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [memory-integrity, backend-ci, reliability-fast, reliability-strict, frontend-ci, security-audit]
    if: always()
    steps:
      - name: Report
        run: |
          echo "## GIOM CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Memory Integrity | ${{ needs.memory-integrity.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend CI | ${{ needs.backend-ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Reliability Fast | ${{ needs.reliability-fast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Reliability Strict | ${{ needs.reliability-strict.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend CI | ${{ needs.frontend-ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
        shell: bash
