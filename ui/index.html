<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GROOT Assistant</title>
  <link rel="stylesheet" href="style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
</head>

<body data-theme="dark">
  <div class="app">
    <!-- Sidebar Moderna -->
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">🌳</div>
        <div class="brand-text">
          <div class="brand-title">GROOT</div>
          <div class="brand-subtitle">AI Assistant</div>
        </div>
      </div>

      <!-- Menu Principal -->
      <nav class="nav">
        <button class="nav-item active" data-view="chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2z"/>
            <path d="M3 7h18"/>
          </svg>
          Chat
        </button>
        <button class="nav-item" data-view="memory">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a4 4 0 0 1-4 4H2a4 4 0 0 1-4-4V7a4 4 0 0 1 4-4z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a4 4 0 0 0 4 4h6a4 4 0 0 0 4-4V7a4 4 0 0 0-4-4z"/>
            <path d="M6 10h.01"/>
          </svg>
          Memória
        </button>
        <button class="nav-item" data-view="settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v6m0 6v6m4.22-13.22 2.03-2.03 2.03-2.03A8 8 0 0 1 12 20.09c0 2.17.67 4.14 1.88 5.95-2.58 5.95-5.95 0-3.97-1.78-5.95-2.58A8 8 0 0 1 12 4.91c-2.17-.67-4.14-1.88-5.95-2.58z"/>
          </svg>
          Configurações
        </button>
      </nav>

      <!-- Workspaces Accordion -->
      <div class="section">
        <div class="section-header" onclick="toggleAccordion('workspaces')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18m-9-9v18m0-18l6 6"/>
          </svg>
          <span class="section-title">Workspaces</span>
          <svg class="accordion-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6,9 12,15 18,9"/>
          </svg>
        </div>
        <div class="accordion-content" id="workspaces">
          <button class="channel active">GROOT Assistant</button>
          <button class="channel">Debug Squad</button>
          <button class="channel">Build Room</button>
        </div>
      </div>

      <!-- Atalhos Accordion -->
      <div class="section">
        <div class="section-header" onclick="toggleAccordion('shortcuts')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M13 2L3 14h9l-1 1"/>
            <path d="M22 3v11h-4"/>
          </svg>
          <span class="section-title">Atalhos</span>
          <svg class="accordion-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6,9 12,15 18,9"/>
          </svg>
        </div>
        <div class="accordion-content hidden" id="shortcuts">
          <button class="channel">Projetos</button>
          <button class="channel">Extensões</button>
          <button class="channel">Segurança</button>
        </div>
      </div>

      <!-- Perfil do Usuário -->
      <div class="profile">
        <div class="avatar" id="userAvatar">🌳</div>
        <div class="profile-info">
          <div class="profile-name" id="userName">Visitante</div>
          <div class="profile-role" id="userRole">Sem login</div>
        </div>
        <div class="user-menu-container">
          <button id="loginBtn" class="ghost">Entrar</button>
          <div id="userDropdown" class="user-dropdown hidden">
            <button id="switchAccount" class="dropdown-item">Trocar conta</button>
            <button id="logoutBtn" class="dropdown-item danger">Sair</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <!-- Topbar Minimalista -->
      <header class="topbar">
        <div class="top-left">
          <div class="page-title">GROOT Assistant</div>
        </div>
        <div class="top-actions">
          <button id="themeToggle" class="icon-btn" title="Alternar tema">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11 21v-1a9 9 0 0 1 18-15.21"/>
              <path d="M12 18v3m0-6v-3"/>
            </svg>
          </button>
          <button id="newChat" class="icon-btn" title="Nova conversa">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14,2 14,8 20,8"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Área Principal de Chat -->
      <div class="chat-container">
        <div id="chat" class="chat-stream"></div>
        
        <!-- Input Fixo no Bottom -->
        <div class="composer-fixed">
          <div class="composer-box">
            <textarea id="msg" placeholder="Digite sua mensagem..." rows="1"></textarea>
            <input id="fileInput" type="file" class="hidden" />
            <button id="uploadBtn" class="icon-btn" title="Enviar arquivo">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 0-8.49 8.49L9.81 14.54A6 6 0 0 0 12 14.54l-2.44 2.44a6 6 0 0 0 8.49-8.49l9.19-9.19a6 6 0 0 0 8.49-8.49z"/>
                <line x1="12" y1="20" x2="12" y2="23"/>
              </svg>
            </button>
            <button id="sendBtn" class="send-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22,2 15,22 11,13"/>
              </svg>
            </button>
          </div>
          <div id="uploadStatus" class="upload-status"></div>
        </div>
      </div>

      <!-- Views Ocultas -->
      <div class="view hidden" id="view-memory"></div>
      <div class="view hidden" id="view-settings"></div>
    </main>
  </div>

  <!-- Modais -->
  <div id="ageModal" class="modal hidden">
    <div class="modal-card">
      <h2>Quando você nasceu?</h2>
      <p>Isso ajuda o GROOT a adaptar as respostas.</p>
      <div class="field">
        <label for="birthMonth">Mês de nascimento</label>
        <select id="birthMonth">
          <option value="">Selecione...</option>
          <option value="01">Janeiro</option>
          <option value="02">Fevereiro</option>
          <option value="03">Março</option>
          <option value="04">Abril</option>
          <option value="05">Maio</option>
          <option value="06">Junho</option>
          <option value="07">Julho</option>
          <option value="08">Agosto</option>
          <option value="09">Setembro</option>
          <option value="10">Outubro</option>
          <option value="11">Novembro</option>
          <option value="12">Dezembro</option>
        </select>
      </div>
      <div class="field">
        <label for="birthYear">Ano de nascimento</label>
        <select id="birthYear">
          <option value="">Selecione...</option>
        </select>
      </div>
      <div class="modal-actions">
        <button id="confirmAge" class="primary">Confirmar</button>
      </div>
    </div>
  </div>

  <div id="loginModal" class="modal hidden">
    <div class="modal-card">
      <h2>Entrar no GROOT</h2>
      <p>Use email ou conecte com GitHub/Google.</p>
      <div class="field">
        <label for="emailInput">Email</label>
        <input id="emailInput" type="email" placeholder="voce@email.com" />
      </div>
      <div class="field">
        <label for="passwordInput">Senha</label>
        <input id="passwordInput" type="password" placeholder="•••••••" />
      </div>
      <div class="modal-actions">
        <button id="emailLogin" class="primary">Entrar</button>
        <button id="emailSignup" class="ghost">Criar conta</button>
      </div>
      <div id="loginStatus" class="status-text"></div>
      <div class="divider">ou</div>
      <div class="modal-actions">
        <button id="googleLogin" class="ghost">Continuar com Google</button>
        <button id="githubLogin" class="ghost">Continuar com GitHub</button>
      </div>
      <button id="closeLogin" class="link">Fechar</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="chat.js"></script>
</body>

</html>
